name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Permite lanzar el workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios para que GitHub Actions pueda escribir en gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos — si hay un deploy en curso, el nuevo espera
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Si el repo no está en la raíz de GitHub Pages (e.g. username.github.io/repo-name),
        # descomentar la siguiente línea y ajustar BASE_URL al nombre del repo:
        # env:
        #   VITE_BASE_URL: /digital-twin-water/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4