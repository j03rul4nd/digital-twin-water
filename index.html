<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTP Digital Twin</title>
  <meta name="description" content="Water Treatment Plant Digital Twin — real-time monitoring" />
  <meta name="theme-color" content="#0b0c0e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">


  <meta property="og:title" content="Digital Twin Water" />
  <meta property="og:description" content="Real-time Water Treatment Digital Twin" />
  <meta property="og:image" content="https://j03rul4nd.github.io/digital-twin-water/cover.png" />
  <meta property="og:url" content="https://j03rul4nd.github.io/digital-twin-water/" />
  <meta property="og:type" content="website" />


  <link rel="apple-touch-icon" href="icons/icon_192.png" />

  <!-- Fuentes — JetBrains Mono para valores numéricos, IBM Plex Sans para UI -->
  <!-- Evitar Inter genérico — señal de AI slop. JetBrains Mono tiene mejor
       legibilidad en 10–12px que Fira Code o Source Code Pro. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ── Tokens de diseño ── DESIGN.md §Tokens de diseño ──────────────────── */
    :root {
      /* Fondos */
      --bg:    #0b0c0e;
      --bg1:   #111316;
      --bg2:   #16181c;
      --bg3:   #1c1f24;

      /* Bordes */
      --line:  #ffffff0f;
      --line2: #ffffff18;

      /* Texto */
      --text0: #f0f0f0;
      --text1: #a0a4ad;
      --text2: #52565f;

      /* Semánticos — SOLO para estado de proceso y acciones */
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --blue:     #3b82f6;

      /* Semánticos con opacidad — para fondos de estado */
      --green-bg: #22c55e12;
      --amber-bg: #f59e0b14;
      --red-bg:   #ef444414;
      --blue-bg:  #3b82f614;
    }

    /* ── Reset y base ──────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text0);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Scrollbar mínima ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 1px; }

    /* ── Live dot ──────────────────────────────────────────────────────────── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .live-dot.pulse {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ── Transición de alerta al resolverse ────────────────────────────────── */
    .alert-item {
      transition: opacity 0.2s ease;
    }

    /* ── Mapa oscuro ───────────────────────────────────────────────────────── */
    /* Convierte tiles OSM claros en mapa coherente con el tema oscuro
       sin necesitar tiles propietarios ni de pago. */
    .map-tiles-dark {
      filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(0.9);
    }

    /* ── user-select: none en elementos que se actualizan frecuentemente ───── */
    /* Evita selecciones accidentales al leer valores que cambian cada 500ms. */
    .sensor-row,
    .alert-item,
    #topbar {
      user-select: none;
    }

    /* ══ LAYOUT PRINCIPAL ═══════════════════════════════════════════════════ */

    /* ── Topbar ─────────────────────────────────────────────────────────────  */
    #topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      z-index: 10;
      background: var(--bg1);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 0;
    }

    /* ── Viewport 3D — fullscreen bajo el topbar ────────────────────────────  */
    /* Los paneles flotan sobre él con position: absolute.
       El renderer de Three.js usa alpha: true para fundirse con --bg. */
    #viewport {
      position: absolute;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
    }

    /* ── Panel izquierdo — Telemetría ───────────────────────────────────────  */
    #panel-left {
      position: absolute;
      top: 52px;
      left: 12px;
      bottom: 12px;
      width: 210px;
      z-index: 5;
      background: var(--bg1);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Panel derecho — Alertas + MQTT + Minimap ───────────────────────────  */
    #panel-right {
      position: absolute;
      top: 52px;
      right: 12px;
      bottom: 12px;
      width: 220px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Sub-paneles del panel derecho */
    .sub-panel {
      background: var(--bg1);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    /* Panel de alertas — ocupa el espacio disponible */
    #panel-alerts {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    /* Panel MQTT — altura por contenido */
    #panel-mqtt {
      flex-shrink: 0;
    }

    /* Panel minimap — altura fija */
    #panel-minimap {
      flex-shrink: 0;
      height: 120px;
      display: flex;
      flex-direction: column;
    }

    /* ── Panel headers — compartidos ────────────────────────────────────────  */
    .panel-header {
      padding: 10px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 36px;
    }

    .panel-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--text1);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Sensor rows ────────────────────────────────────────────────────────  */
    .sensor-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 7px 12px;
      min-height: 36px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background-color 0.15s;
    }

    .sensor-row:last-child {
      border-bottom: none;
    }

    .sensor-row:hover {
      background: var(--bg3);
    }

    .sensor-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sensor-bar-wrap {
      height: 2px;
      border-radius: 1px;
      background: var(--line2);
      margin-top: 4px;
      overflow: hidden;
    }

    .sensor-bar-fill {
      height: 100%;
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    .sensor-value-wrap {
      display: flex;
      align-items: baseline;
      gap: 2px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .sensor-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      transition: color 0.3s ease;
    }

    .sensor-unit {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 8px;
      color: var(--text2);
    }

    /* Row en estado danger — fondo rojo muy sutil */
    .sensor-row.is-danger {
      background-color: var(--red-bg);
    }

    /* ── Alert items ────────────────────────────────────────────────────────  */
    .alert-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      position: relative;
      padding-left: 15px; /* espacio para el acento izquierdo */
    }

    .alert-item:last-child {
      border-bottom: none;
    }

    .alert-accent {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .alert-sensors {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .alert-message {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text0);
      line-height: 1.4;
    }

    .alert-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text2);
      margin-top: 4px;
    }

    .alert-empty {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text2);
      padding: 16px 12px;
      text-align: center;
    }

    /* ── MQTT panel rows ────────────────────────────────────────────────────  */
    #panel-mqtt .mqtt-body {
      padding: 12px;
    }

    .mqtt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .mqtt-row:last-of-type {
      margin-bottom: 0;
    }

    .mqtt-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text2);
    }

    .mqtt-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text1);
    }

    .mqtt-connect-btn {
      width: 100%;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 4px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      padding: 6px 12px;
      margin-top: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .mqtt-connect-btn:hover {
      opacity: 0.8;
    }

    .mqtt-connect-btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .mqtt-connect-btn.is-connected {
      background: var(--red-bg);
      color: var(--red);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .mqtt-error-msg {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--red);
      margin-top: 6px;
      display: none;
    }

    /* ── Minimap ────────────────────────────────────────────────────────────  */
    #minimap-container {
      flex: 1;
      min-height: 0;
    }

    .minimap-footer {
      padding: 4px 8px;
      background: var(--bg2);
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .minimap-coords {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text2);
    }

    .minimap-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
    }

    /* ── Topbar elements ────────────────────────────────────────────────────  */
    .topbar-sep {
      width: 1px;
      height: 16px;
      background: var(--line2);
      margin: 0 12px;
      flex-shrink: 0;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .topbar-brand-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text0);
    }

    .topbar-plant-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .topbar-plant-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text2);
    }

    #plant-id-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: transparent;
      border: none;
      color: var(--text0);
      width: 80px;
      outline: none;
    }

    #plant-id-input:focus {
      border-bottom: 1px solid var(--line2);
    }

    .topbar-source {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .topbar-source-text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
    }

    .topbar-tick {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .topbar-spacer {
      flex: 1;
    }

    /* Alert chip — opacity: 0 cuando no hay alertas (nunca display: none) */
    #alert-chip {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--red-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    #alert-chip.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #alert-chip.is-warning {
      background: var(--amber-bg);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--amber);
    }

    .topbar-btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
      background: transparent;
      padding: 4px 8px;
      border: 1px solid var(--line2);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background-color 0.15s, color 0.15s;
    }

    /* Botón de simulación — variante con acento ámbar cuando está activo */
    .topbar-btn--sim {
      color: var(--text1);
    }
    .topbar-btn--sim.is-active {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-bg);
    }
    .topbar-btn--sim:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .topbar-btn:hover {
      background: var(--bg3);
      color: var(--text0);
    }

    /* Live badge en panel header */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .live-badge-text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
    }

    .live-badge .live-dot {
      background: var(--text2); /* gris hasta el primer tick */
    }

    .live-badge.is-live .live-dot {
      background: var(--green);
    }

    .live-badge.is-live .live-badge-text {
      color: var(--green);
    }

    /* ══ CONFIG MODAL ════════════════════════════════════════════════════════ */

    #config-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #config-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #config-modal {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 8px;
      width: 440px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(6px);
      transition: transform 0.15s ease;
    }

    #config-overlay.visible #config-modal {
      transform: translateY(0);
    }

    #cfg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
    }

    #cfg-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text0);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #cfg-close {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }

    #cfg-close:hover {
      color: var(--text0);
      background: var(--bg3);
    }

    #cfg-body {
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .cfg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cfg-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .cfg-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cfg-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text0);
      background: var(--bg3);
      border: 1px solid var(--line2);
      border-radius: 4px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .cfg-input:focus {
      border-color: var(--blue);
    }

    .cfg-input::placeholder {
      color: var(--text2);
    }

    .cfg-hint {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
    }

    #cfg-status {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 20px;
      padding: 0 2px;
    }

    #cfg-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      display: none;
    }

    #cfg-status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }

    #cfg-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      margin-top: 6px;
    }

    .cfg-btn-ghost {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
      background: transparent;
      border: 1px solid var(--line2);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .cfg-btn-ghost:hover {
      background: var(--bg3);
      color: var(--text0);
    }

    .cfg-btn-primary {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--blue);
      background: var(--blue-bg);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .cfg-btn-primary:hover:not(:disabled) {
      opacity: 0.8;
    }

    .cfg-btn-primary:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    /* Botón disconnect — fondo rojo sutil */
    .cfg-btn-disconnect {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--red);
      background: var(--red-bg);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .cfg-btn-disconnect:hover {
      opacity: 0.8;
    }

    /* Botón danger (clear config) */
    .cfg-btn-danger {
      color: var(--red);
      border-color: rgba(239,68,68,0.2);
    }

    .cfg-btn-danger:hover {
      background: var(--red-bg);
      color: var(--red);
    }

    /* Header del modal con dot de estado */
    #cfg-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #cfg-source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text2);
      flex-shrink: 0;
    }

    /* Panel de info cuando está conectado */
    #cfg-connected-info {
      background: var(--green-bg);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 6px;
      padding: 12px;
      margin-top: 4px;
    }

    .cfg-connected-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .cfg-connected-row:last-child {
      margin-bottom: 0;
    }

    .cfg-connected-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text2);
    }

    .cfg-connected-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text1);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    /* Estado connected en el botón del panel MQTT */
    .mqtt-connect-btn.is-connected {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(34,197,94,0.3);
    }

    /* ══ ALERT PANEL — History ═══════════════════════════════════════════════ */

    /* Separador de sección History */
    #alerts-history-section {
      border-top: 1px solid var(--line);
    }

    .alerts-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--bg2);
    }

    .alerts-section-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      font-weight: 500;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .alerts-clear-btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }

    .alerts-clear-btn:hover {
      color: var(--text0);
      background: var(--bg3);
    }

    /* Badge de severidad en alertas activas */
    .alert-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 2px;
      margin-bottom: 3px;
      letter-spacing: 0.05em;
    }

    .alert-badge--danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .alert-badge--warning {
      background: var(--amber-bg);
      color: var(--amber);
      border: 1px solid rgba(245,158,11,0.2);
    }

    /* Badge de alertas resueltas — gris neutro */
    .alert-badge--resolved {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--line2);
    }

    /* Alertas resueltas — aspecto atenuado */
    .alert-item--resolved {
      opacity: 0.7;
    }

    .alert-item--resolved:hover {
      opacity: 1;
    }

    .alert-accent--resolved {
      opacity: 0.35;
    }

    .alert-message--resolved {
      color: var(--text1);
    }

    /* Row de resolución con duración */
    .alert-resolved-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .alert-resolved-duration {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text2);
    }

    /* ══ SENSOR DETAIL MODAL ══════════════════════════════════════════════════ */

    #sensor-detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #sensor-detail-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #sensor-detail-modal {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 8px;
      width: 420px;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      transform: translateY(6px);
      transition: transform 0.15s ease;
    }

    #sensor-detail-overlay.visible #sensor-detail-modal {
      transform: translateY(0);
    }

    #sd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
    }

    #sd-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sd-sensor-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text0);
    }

    .sd-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text2);
    }

    .sd-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .sd-badge--normal  { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(34,197,94,0.2);  }
    .sd-badge--warning { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.2); }
    .sd-badge--danger  { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(239,68,68,0.2);  }

    #sd-close {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }

    #sd-close:hover { color: var(--text0); background: var(--bg3); }

    #sd-value-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 14px 16px 0;
    }

    .sd-big-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--green);
      line-height: 1;
      transition: color 0.3s ease;
    }

    .sd-big-unit {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      color: var(--text2);
    }

    #sd-chart-wrap {
      position: relative;
      padding: 12px 16px 0;
    }

    #sd-chart {
      width: 100%;
      height: 120px;
      display: block;
      overflow: visible;
    }

    #sd-no-data {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      color: var(--text2);
    }

    #sd-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--line);
      margin: 12px 16px 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
    }

    .sd-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      background: var(--bg2);
      gap: 3px;
    }

    .sd-stat-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .sd-stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text0);
    }

    #sd-footer {
      padding: 10px 16px 14px;
    }

    .sd-hint {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
    }

    /* Icono de chart en sensor rows */
    .sensor-chart-icon {
      font-size: 9px;
      color: var(--text2);
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .sensor-row:hover .sensor-chart-icon {
      opacity: 1;
    }

    /* ══ INCIDENT PANEL ══════════════════════════════════════════════════════ */

    #incident-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      min-width: 320px;
      max-width: 520px;
    }

    #incident-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #incident-pill:hover {
      border-color: rgba(255,255,255,0.15);
      background: var(--bg2);
    }

    #incident-pill.has-active {
      border-color: rgba(239,68,68,0.4);
      background: var(--red-bg);
    }

    #incident-pill-icon {
      font-size: 11px;
    }

    #incident-pill-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
      font-weight: 500;
    }

    #incident-pill-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      flex: 1;
    }

    #incident-toggle {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 8px;
      padding: 0 2px;
      line-height: 1;
    }

    #incident-body {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 8px;
      margin-top: 6px;
      overflow: hidden;
    }

    #incident-scenarios {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--line);
      padding: 0;
    }

    .incident-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 12px;
      background: var(--bg1);
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      gap: 2px;
    }

    .incident-btn:hover {
      background: var(--bg3);
    }

    .incident-btn.is-active {
      background: var(--red-bg);
    }

    .incident-btn--warning.is-active {
      background: var(--amber-bg);
    }

    .incident-btn-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--text0);
    }

    .incident-btn--danger .incident-btn-label { color: var(--red); }
    .incident-btn--warning .incident-btn-label { color: var(--amber); }

    .incident-btn.is-active .incident-btn-label {
      color: var(--text0);
    }

    .incident-btn-desc {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      color: var(--text2);
    }

    #incident-active-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .incident-active-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text0);
    }

    .incident-active-name--danger  { color: var(--red);   }
    .incident-active-name--warning { color: var(--amber); }

    #incident-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text2);
    }

    .incident-reset {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      color: var(--text1);
      background: transparent;
      border: 1px solid var(--line2);
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .incident-reset:hover {
      background: var(--bg3);
      color: var(--text0);
    }

    /* ══ WEBHOOK PANEL ═══════════════════════════════════════════════════════ */

    #webhook-overlay, #mapper-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
    }
    #webhook-overlay.visible, #mapper-overlay.visible {
      opacity: 1; pointer-events: auto;
    }

    #webhook-modal, #mapper-modal {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 8px;
      width: 480px;
      max-width: calc(100vw - 32px);
      max-height: 80vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      transform: translateY(6px);
      transition: transform 0.15s ease;
    }
    #webhook-overlay.visible #webhook-modal,
    #mapper-overlay.visible  #mapper-modal {
      transform: translateY(0);
    }

    #wh-header, #mapper-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    #wh-title, #mapper-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      color: var(--text0);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    #wh-close, #mapper-close {
      background: transparent; border: none;
      color: var(--text2); cursor: pointer; font-size: 12px;
      padding: 2px 6px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    #wh-close:hover, #mapper-close:hover { color: var(--text0); background: var(--bg3); }

    #wh-body, #mapper-body {
      overflow-y: auto; padding: 16px; flex: 1;
      display: flex; flex-direction: column; gap: 14px;
    }

    .wh-empty {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px; color: var(--text2);
      text-align: center; padding: 20px 0;
    }

    /* Webhook items */
    .wh-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: 6px; gap: 10px;
    }
    .wh-item-left  { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .wh-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .wh-item-info  { min-width: 0; }
    .wh-item-name  { font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; color: var(--text0); }
    .wh-item-url   { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wh-item-events { font-family: 'IBM Plex Sans', sans-serif; font-size: 9px; color: var(--text2); margin-top: 2px; }

    .wh-result-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .wh-result-dot.ok   { background: var(--green); }
    .wh-result-dot.fail { background: var(--red); }

    /* Toggle switch */
    .wh-toggle { position: relative; display: inline-block; width: 28px; height: 16px; flex-shrink: 0; }
    .wh-toggle input { opacity: 0; width: 0; height: 0; }
    .wh-toggle-track {
      position: absolute; inset: 0; cursor: pointer;
      background: var(--bg3); border-radius: 8px;
      border: 1px solid var(--line2);
      transition: background 0.2s;
    }
    .wh-toggle-track::after {
      content: ''; position: absolute;
      left: 2px; top: 50%; transform: translateY(-50%);
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text2); transition: left 0.2s, background 0.2s;
    }
    .wh-toggle input:checked + .wh-toggle-track { background: var(--blue-bg); border-color: rgba(59,130,246,0.3); }
    .wh-toggle input:checked + .wh-toggle-track::after { left: 14px; background: var(--blue); }

    /* Shared form styles */
    .wh-input, .mapper-input {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text0); background: var(--bg3);
      border: 1px solid var(--line2); border-radius: 4px;
      padding: 7px 10px; outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .wh-input:focus, .mapper-input:focus { border-color: var(--blue); }
    .wh-input::placeholder, .mapper-input::placeholder { color: var(--text2); }

    .wh-label, .mapper-section-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 4px; display: block;
    }
    .mapper-optional { text-transform: none; font-size: 9px; }

    .wh-hint, .mapper-hint {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px; color: var(--text2); margin-top: 3px; display: block;
    }
    .wh-link, .mapper-link { color: var(--blue); text-decoration: none; }

    .wh-form-field, .mapper-section { display: flex; flex-direction: column; gap: 4px; }

    .wh-checkboxes { display: flex; flex-direction: column; gap: 6px; padding: 4px 0; }
    .wh-check {
      display: flex; align-items: center; gap: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px; color: var(--text1); cursor: pointer;
    }
    .wh-check input { cursor: pointer; accent-color: var(--blue); }

    .wh-form-actions, #mapper-footer {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--line); flex-shrink: 0;
    }

    #wh-footer { padding: 10px 16px; border-top: 1px solid var(--line); flex-shrink: 0; }

    #wh-form-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; margin-top: 2px;
    }

    .wh-add-btn {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 10px;
      color: var(--blue); background: var(--blue-bg);
      border: 1px solid rgba(59,130,246,0.3); border-radius: 4px;
      padding: 7px 14px; cursor: pointer; width: 100%;
      transition: opacity 0.15s;
    }
    .wh-add-btn:hover { opacity: 0.8; }

    .wh-btn-ghost, .mapper-btn-ghost {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 10px;
      color: var(--text1); background: transparent;
      border: 1px solid var(--line2); border-radius: 4px;
      padding: 6px 14px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .wh-btn-ghost:hover, .mapper-btn-ghost:hover { background: var(--bg3); color: var(--text0); }

    .wh-btn-primary, .mapper-btn-primary {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 10px;
      color: var(--blue); background: var(--blue-bg);
      border: 1px solid rgba(59,130,246,0.3); border-radius: 4px;
      padding: 6px 14px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .wh-btn-primary:hover, .mapper-btn-primary:hover { opacity: 0.8; }

    .wh-btn-icon {
      font-size: 11px; color: var(--text2); background: transparent;
      border: none; cursor: pointer; padding: 3px 5px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .wh-btn-icon:hover { color: var(--text0); background: var(--bg3); }
    .wh-btn-delete:hover { color: var(--red); }

    /* ══ PAYLOAD MAPPER PANEL ════════════════════════════════════════════════ */

    .mapper-modes { display: flex; flex-direction: column; gap: 6px; }
    .mapper-mode-option { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
    .mapper-mode-option input { margin-top: 3px; accent-color: var(--blue); flex-shrink: 0; }
    .mapper-mode-card { display: flex; flex-direction: column; gap: 2px; }
    .mapper-mode-name { font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; color: var(--text0); }
    .mapper-mode-desc { font-family: 'IBM Plex Sans', sans-serif; font-size: 9px; color: var(--text2); }

    .mapper-textarea {
      resize: vertical; min-height: 80px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
    }

    .mapper-detected-fields {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .mapper-code {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      background: var(--bg3); border: 1px solid var(--line2);
      border-radius: 3px; padding: 2px 6px; color: var(--text1);
    }

    .mapper-mapping-row {
      display: grid;
      grid-template-columns: 1fr 16px 1fr 1fr 24px;
      align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .mapper-arrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text2); text-align: center;
    }

    #mapper-mappings-list { margin-bottom: 6px; }

    #mapper-analyze-result {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px; padding: 8px;
      background: var(--bg2); border-radius: 4px;
      border: 1px solid var(--line); margin-top: 4px;
    }

    /* ══ KPI PANEL ═══════════════════════════════════════════════════════════ */

    #kpi-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
    }
    #kpi-overlay.visible { opacity: 1; pointer-events: auto; }

    #kpi-modal {
      background: var(--bg1);
      border: 1px solid var(--line2);
      border-radius: 8px;
      width: 460px;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      transform: translateY(6px);
      transition: transform 0.15s ease;
    }
    #kpi-overlay.visible #kpi-modal { transform: translateY(0); }

    #kpi-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--line);
    }
    #kpi-header-left { display: flex; align-items: center; gap: 10px; }
    #kpi-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      color: var(--text0);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .kpi-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--text2);
    }
    #kpi-close {
      background: transparent; border: none;
      color: var(--text2); cursor: pointer; font-size: 12px;
      padding: 2px 6px; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    #kpi-close:hover { color: var(--text0); background: var(--bg3); }

    #kpi-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* Grid top — 3 KPIs principales */
    .kpi-grid-top {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .kpi-card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 10px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 3px;
    }
    .kpi-card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px; font-weight: 500;
      color: var(--text0); line-height: 1;
    }
    .kpi-card-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .kpi-card-sub {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px; color: var(--text2);
    }

    /* Barra de estado operacional */
    .kpi-status-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
    .kpi-status-bar {
      height: 6px; border-radius: 3px;
      background: var(--bg3);
      display: flex; overflow: hidden;
    }
    .kpi-status-normal  { background: var(--green);  height: 100%; transition: width 0.5s ease; }
    .kpi-status-warning { background: var(--amber);  height: 100%; transition: width 0.5s ease; }
    .kpi-status-danger  { background: var(--red);    height: 100%; transition: width 0.5s ease; }
    .kpi-status-legend {
      display: flex; align-items: center; gap: 10px;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 9px; color: var(--text2);
    }
    .kpi-legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .kpi-legend-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; }

    /* Grid secundario — stats pequeños */
    .kpi-grid-secondary {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--line);
      border: 1px solid var(--line); border-radius: 4px; overflow: hidden;
    }
    .kpi-stat {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px; background: var(--bg2); gap: 4px;
    }
    .kpi-stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500; color: var(--text0);
    }
    .kpi-stat-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.04em; text-align: center;
    }

    #kpi-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      text-align: center;
    }



    /* ═══════════════════════════════════════════════════════════════════
      RESPONSIVE MOBILE — añadir al final de la sección <style> en index.html
      Breakpoint principal: 768px
      ═══════════════════════════════════════════════════════════════════ */

    /* ── Topbar responsive ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #topbar {
        padding: 0 8px;
        gap: 0;
        overflow: hidden;
      }

      /* Ocultar elementos secundarios del topbar en móvil */
      .topbar-sep:nth-child(n+4),
      .topbar-tick,
      #btn-docs,
      #btn-export {
        display: none;
      }

      /* Comprimir separadores visibles */
      .topbar-sep {
        margin: 0 6px;
      }

      .topbar-brand-name {
        font-size: 10px;
      }

      /* Botones del topbar — más pequeños en móvil */
      .topbar-btn {
        font-size: 9px;
        padding: 3px 6px;
      }

      /* Alert chip — más compacto */
      #alert-chip {
        font-size: 9px;
        padding: 2px 6px;
      }

      /* Plant ID — ocultar label, solo input */
      .topbar-plant-label {
        display: none;
      }

      #plant-id-input {
        width: 60px;
        font-size: 10px;
      }
    }

    /* ── Panels — full layout mobile ───────────────────────────────────── */
    @media (max-width: 768px) {

      /* El viewport 3D sigue siendo fullscreen — no cambia */
      #viewport {
        top: 40px;
        left: 0;
        right: 0;
        /* Dejar espacio para el bottom tab bar */
        bottom: 56px;
      }

      /* ── Panel izquierdo — bottom sheet ─────────────────────────────── */
      #panel-left {
        position: fixed;
        top: auto;
        left: 0;
        right: 0;
        bottom: 56px;
        width: 100%;
        height: auto;
        max-height: 55vh;
        border-radius: 12px 12px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        z-index: 20;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        /* Drag handle visual */
        padding-top: 0;
      }

      #panel-left.mobile-open {
        transform: translateY(0);
      }

      /* Handle de arrastre en el panel izquierdo */
      #panel-left::before {
        content: '';
        display: block;
        width: 32px;
        height: 3px;
        background: var(--line2);
        border-radius: 2px;
        margin: 8px auto 0;
        flex-shrink: 0;
      }

      /* Panel izquierdo en móvil — scroll interno */
      #telemetry-body {
        max-height: calc(55vh - 60px);
        overflow-y: auto;
      }

      /* ── Panel derecho — bottom sheet ───────────────────────────────── */
      #panel-right {
        position: fixed;
        top: auto;
        left: 0;
        right: 0;
        bottom: 56px;
        width: 100%;
        height: auto;
        max-height: 65vh;
        border-radius: 12px 12px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        z-index: 20;
        gap: 0;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        /* Fondo para que tape la escena */
        background: var(--bg1);
      }

      #panel-right.mobile-open {
        transform: translateY(0);
      }

      /* Handle de arrastre en el panel derecho */
      #panel-right::before {
        content: '';
        display: block;
        width: 32px;
        height: 3px;
        background: var(--line2);
        border-radius: 2px;
        margin: 8px auto 4px;
        flex-shrink: 0;
      }

      /* Sub-paneles en móvil — sin radius, sin margen entre ellos */
      #panel-right .sub-panel {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      #panel-right .sub-panel:first-child {
        border-top: none;
      }

      /* Panel de alertas — scroll en móvil */
      #panel-alerts {
        flex: 0 0 auto;
        max-height: 35vh;
        overflow-y: auto;
        min-height: 0;
      }

      /* Panel MQTT — compacto */
      #panel-mqtt {
        flex-shrink: 0;
      }

      /* Minimap en móvil — altura reducida */
      #panel-minimap {
        height: 100px;
        flex-shrink: 0;
      }

      /* ── Tab bar — navegación bottom ────────────────────────────────── */
      /* Se inyecta por JS (MobileTabBar) */
      #mobile-tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--bg1);
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-around;
        z-index: 30;
        padding: 0 8px;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      .mobile-tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        flex: 1;
        height: 100%;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 6px 4px;
        border-radius: 6px;
        transition: background-color 0.15s;
        position: relative;
      }

      .mobile-tab:active {
        background: var(--bg3);
      }

      .mobile-tab.is-active {
        background: var(--bg3);
      }

      .mobile-tab-icon {
        font-size: 16px;
        line-height: 1;
      }

      .mobile-tab-label {
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 9px;
        color: var(--text2);
        line-height: 1;
        transition: color 0.15s;
      }

      .mobile-tab.is-active .mobile-tab-label {
        color: var(--blue);
      }

      /* Badge de alertas en el tab */
      .mobile-tab-badge {
        position: absolute;
        top: 4px;
        right: calc(50% - 16px);
        min-width: 14px;
        height: 14px;
        background: var(--red);
        border-radius: 7px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 8px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 3px;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: none;
      }

      .mobile-tab-badge.visible {
        opacity: 1;
      }

      /* Overlay de fondo al abrir panels */
      #mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 15;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #mobile-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      /* ── Ajustes de modales en móvil ────────────────────────────────── */
      #config-modal,
      #sensor-detail-modal,
      #webhook-modal,
      #mapper-modal,
      #kpi-modal {
        width: calc(100vw - 16px);
        max-height: 90vh;
        overflow-y: auto;
      }

      /* KPI modal — grid responsive */
      .kpi-grid-top {
        grid-template-columns: 1fr 1fr;
      }

      .kpi-grid-secondary {
        grid-template-columns: repeat(2, 1fr);
      }

      /* Incident panel — reposicionar */
      #incident-panel {
        bottom: 68px; /* por encima del tab bar */
        left: 8px;
        right: 8px;
        transform: none;
        min-width: unset;
        max-width: unset;
      }

      /* Sensor detail modal — gráfico más pequeño */
      #sd-chart {
        height: 90px;
      }
    }

    /* ── Ajustes para pantallas muy pequeñas (< 375px) ─────────────────── */
    @media (max-width: 375px) {
      .topbar-brand-name {
        display: none;
      }

      .topbar-btn {
        padding: 3px 5px;
        font-size: 8px;
      }

      #btn-kpis,
      #btn-webhooks,
      #btn-payload-mapper {
        display: none;
      }
    }

    /* ── Landscape móvil — ajustes para uso horizontal ─────────────────── */
    @media (max-width: 768px) and (orientation: landscape) {
      #panel-left,
      #panel-right {
        max-height: 70vh;
      }

      #telemetry-body {
        max-height: calc(70vh - 60px);
      }

      #panel-alerts {
        max-height: 25vh;
      }

      #panel-minimap {
        height: 80px;
      }
    }

    /* ── Asegurar que en desktop nada de lo mobile afecta ───────────────── */
    @media (min-width: 769px) {
      #mobile-tab-bar,
      #mobile-overlay {
        display: none !important;
      }

      #panel-left,
      #panel-right {
        transform: none !important;
      }
    }

  </style>
</head>
<body>

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div id="topbar">
    <!-- Brand -->
    <div class="topbar-brand">
      <span class="live-dot pulse" id="system-dot"></span>
      <span class="topbar-brand-name">WTP Digital Twin</span>
    </div>

    <div class="topbar-sep"></div>

    <!-- Plant ID -->
    <div class="topbar-plant-wrap">
      <span class="topbar-plant-label">Plant</span>
      <input id="plant-id-input" type="text" value="plant-01" autocomplete="off" spellcheck="false" />
    </div>

    <div class="topbar-sep"></div>

    <!-- Estado de fuente de datos -->
    <div class="topbar-source">
      <span class="live-dot" id="source-dot" style="background: var(--amber);"></span>
      <span class="topbar-source-text" id="source-text">Simulator</span>
    </div>

    <div class="topbar-sep"></div>

    <!-- Tick rate -->
    <span class="topbar-tick">500ms tick</span>

    <!-- Spacer -->
    <div class="topbar-spacer"></div>

    <!-- Alert chip — opacity: 0 cuando no hay alertas -->
    <span id="alert-chip">0 alerts active</span>

    <div class="topbar-sep"></div>

    <!-- Botón de control de simulación — siempre visible -->
    <button class="topbar-btn topbar-btn--sim" id="btn-simulation" title="Start simulation with synthetic sensor data">▶ Simulation</button>
    <div style="width: 6px;"></div>

    <!-- Separador -->
    <div class="topbar-sep"></div>

    <!-- Botones ghost -->
    <button class="topbar-btn" id="btn-export">Export CSV</button>
    <div style="width: 6px;"></div>
    <button class="topbar-btn" id="btn-kpis">📊 KPIs</button>
    <div style="width: 6px;"></div>
    <button class="topbar-btn" id="btn-webhooks">⚡ Webhooks</button>
    <div style="width: 6px;"></div>
    <button class="topbar-btn" id="btn-payload-mapper">⇄ Payload</button>
    <div style="width: 6px;"></div>
    <button class="topbar-btn" id="btn-docs">Docs ↗</button>
  </div>

  <!-- ── Viewport 3D ─────────────────────────────────────────────────────── -->
  <div id="viewport"></div>

  <!-- ── Panel izquierdo — Telemetría ───────────────────────────────────── -->
  <div id="panel-left">
    <div class="panel-header">
      <span class="panel-title">Telemetry</span>
      <div class="live-badge" id="live-badge">
        <span class="live-dot"></span>
        <span class="live-badge-text">live</span>
      </div>
    </div>
    <!-- Los sensor rows se generan en TelemetryPanel.js -->
    <div id="telemetry-body" style="overflow-y: auto; flex: 1;"></div>
  </div>

  <!-- ── Panel derecho ───────────────────────────────────────────────────── -->
  <div id="panel-right">

    <!-- Alertas -->
    <div class="sub-panel" id="panel-alerts">
      <div class="panel-header">
        <span class="panel-title">Alerts</span>
        <span class="mqtt-value" id="alert-count" style="color: var(--text2);">—</span>
      </div>
      <div id="alerts-body">
        <div class="alert-empty">No active alerts</div>
      </div>
    </div>

    <!-- MQTT -->
    <div class="sub-panel" id="panel-mqtt">
      <div class="mqtt-body">
        <div class="mqtt-row">
          <span class="mqtt-label">Source</span>
          <span class="mqtt-value" id="mqtt-source-val">● Simulator</span>
        </div>
        <div class="mqtt-row">
          <span class="mqtt-label">Broker</span>
          <span class="mqtt-value" id="mqtt-broker-val">hivemq.cloud</span>
        </div>
        <div class="mqtt-row">
          <span class="mqtt-label">Plant ID</span>
          <span class="mqtt-value" id="mqtt-plant-val">plant-01</span>
        </div>
        <button class="mqtt-connect-btn" id="mqtt-connect-btn">Configure &amp; Connect →</button>
        <p class="mqtt-error-msg" id="mqtt-error-msg"></p>
      </div>
    </div>

    <!-- Minimap -->
    <div class="sub-panel" id="panel-minimap">
      <div id="minimap-container"></div>
      <div class="minimap-footer">
        <span class="minimap-coords">41.1189, 1.2445</span>
        <span class="minimap-name">Reus, ES</span>
      </div>
    </div>

  </div>

  <!-- Entry point -->
  <script type="module" src="/src/main.js"></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(() => {}); // silencioso si falla — la app funciona igual
      });
    }
  </script>
</body>
</html>
